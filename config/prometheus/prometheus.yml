# ============================================================================
# Chaos-Sec: Prometheus Scrape Configuration
# Collects metrics from the Chaos-Sec backend and infrastructure services
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # External labels added to every metric from this Prometheus instance
  external_labels:
    cluster: "chaos-sec-dev"
    environment: "development"
    monitor: "chaos-sec"

# ──────────────────────────────────────────────
# Alerting (placeholder — connect to Alertmanager later)
# ──────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# ──────────────────────────────────────────────
# Scrape Configurations
# ──────────────────────────────────────────────
scrape_configs:
  # ──────────────────────────────────────────
  # Prometheus self-monitoring
  # ──────────────────────────────────────────
  - job_name: "prometheus"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"
          component: "monitoring"

  # ──────────────────────────────────────────
  # Chaos-Sec Backend API & Metrics
  # Primary application metrics endpoint on port 9090
  # ──────────────────────────────────────────
  - job_name: "chaos-sec-backend"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - "backend:9090"
        labels:
          service: "chaos-sec-backend"
          component: "api"
          env: "development"
    # Metric relabeling — clean up labels for consistency
    metric_relabel_configs:
      # Drop Go runtime debug metrics we don't need
      - source_labels: [__name__]
        regex: "go_debug_.*"
        action: drop
      # Drop process-specific metrics that are too noisy in dev
      - source_labels: [__name__]
        regex: "process_start_time_seconds"
        action: keep

  # ──────────────────────────────────────────
