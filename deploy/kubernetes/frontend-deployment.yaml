# =============================================================================
# Chaos-Sec Frontend Deployment
# =============================================================================
# Production-ready deployment for the Chaos-Sec React dashboard served via Nginx.
# - Rolling update strategy for zero-downtime deployments
# - Security-hardened with non-root user, dropped capabilities, read-only root
# - Nginx serves the SPA static assets and proxies API/WebSocket to backend
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-sec-frontend
  namespace: chaos-sec
  labels:
    app.kubernetes.io/name: chaos-sec-frontend
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: chaos-sec
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "Chaos-Sec Frontend Dashboard - React SPA served via Nginx"
    contact: "dev@chaos-sec.io"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  minReadySeconds: 5

  # ──────────────────────────────────────────────
  # Rolling Update Strategy
  # ──────────────────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: chaos-sec-frontend
      app.kubernetes.io/component: ui

  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaos-sec-frontend
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: chaos-sec
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/nginx-health"

    spec:
      # ──────────────────────────────────────────
      # Pod Anti-Affinity – spread across nodes/zones
      # ──────────────────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - chaos-sec-frontend
                topologyKey: kubernetes.io/os
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - chaos-sec-frontend
              topologyKey: topology.kubernetes.io/zone

      # ──────────────────────────────────────────
      # Security Context - Pod Level
      # ──────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups:
          - 101

      # ──────────────────────────────────────────
      # Containers
      # ──────────────────────────────────────────
      containers:
        - name: frontend
          image: chaos-sec/frontend:latest
          imagePullPolicy: IfNotPresent

          # ──────────────────────────────────────
          # Ports
          # ──────────────────────────────────────
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # ──────────────────────────────────────
          # Environment Variables
          # ──────────────────────────────────────
          # The frontend Nginx config proxies /api/ and /ws to the backend
          # service, so runtime API URLs are resolved at the proxy level.
          # Build-time env vars (REACT_APP_*) are baked into the image.
          env:
            - name: NODE_ENV
              value: "production"
            - name: BACKEND_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: chaos-sec-config
                  key: BACKEND_SERVICE_HOST
            - name: BACKEND_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: chaos-sec-config
                  key: BACKEND_SERVICE_PORT

          # ──────────────────────────────────────
          # Resource Limits
          # ──────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          # ──────────────────────────────────────
          # Liveness Probe
          # ──────────────────────────────────────
          # Checks if Nginx is alive and serving content.
          # Uses the dedicated /nginx-health endpoint defined in nginx.conf.
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
              httpHeaders:
                - name: X-Health-Check
                  value: k8s-liveness
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # ──────────────────────────────────────
          # Readiness Probe
          # ──────────────────────────────────────
          # Checks if Nginx is ready to serve traffic.
          # Verifies that the main page and backend proxy are reachable.
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
              httpHeaders:
                - name: X-Health-Check
                  value: k8s-readiness
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # ──────────────────────────────────────
          # Startup Probe
          # ──────────────────────────────────────
          # Gives Nginx time to start and load static assets before
          # liveness/readiness probes take over.
          startupProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10

          # ──────────────────────────────────────
          # Container Security Context
          # ──────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ──────────────────────────────────────
          # Volume Mounts
          # ──────────────────────────────────────
          # Nginx needs writable directories for cache, temp, and PID.
          # With readOnlyRootFilesystem, we mount emptyDir volumes over them.
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-conf-volume
              mountPath: /etc/nginx/conf.d
              readOnly: true

      # ──────────────────────────────────────────
      # Volumes
      # ──────────────────────────────────────────
      volumes:
        # Nginx cache directory – stored in memory for performance
        - name: nginx-cache
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

        # Nginx runtime directory for PID file and socket
        - name: nginx-run
          emptyDir:
            medium: Memory
            sizeLimit: 8Mi

        # Temporary directory
        - name: nginx-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi

        # Nginx configuration – pulled from ConfigMap
        # This allows updating nginx.conf without rebuilding the image
        - name: nginx-conf-volume
          configMap:
            name: chaos-sec-nginx-config
            defaultMode: 0444
            items:
              - key: nginx.conf
                path: default.conf

      # ──────────────────────────────────────────
      # Pod Lifecycle & Scheduling
      # ──────────────────────────────────────────
      terminationGracePeriodSeconds: 15
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      serviceAccountName: chaos-sec-frontend
      automountServiceAccountToken: false

      # ──────────────────────────────────────────
      # Topology Spread Constraints
      # ──────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: chaos-sec-frontend
