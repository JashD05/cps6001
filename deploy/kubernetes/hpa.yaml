# =============================================================================
# Chaos-Sec Backend Horizontal Pod Autoscaler
# =============================================================================
# Automatically scales the backend deployment based on CPU and memory
# utilization to handle varying load patterns from chaos experiments.
#
# Scaling behavior:
#   - Min replicas: 2 (ensures high availability)
#   - Max replicas: 10 (prevents runaway scaling)
#   - CPU target: 70% (scale up when avg CPU > 70% of request)
#   - Memory target: 80% (scale up when avg memory > 80% of request)
#
# Stabilization windows prevent flapping:
#   - Scale up: 60s (don't over-react to spikes)
#   - Scale down: 300s (avoid premature scale-down)
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chaos-sec-backend
  namespace: chaos-sec
  labels:
    app.kubernetes.io/name: chaos-sec-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: chaos-sec
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "Horizontal Pod Autoscaler for Chaos-Sec backend API – scales 2-10 replicas based on CPU/memory"
    contact: "dev@chaos-sec.io"
spec:
  # ──────────────────────────────────────────────
  # Target Deployment
  # ──────────────────────────────────────────────
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chaos-sec-backend

  # ──────────────────────────────────────────────
  # Replica Bounds
  # ──────────────────────────────────────────────
  # Min 2 ensures high availability during normal load.
  # Max 10 prevents excessive resource consumption while
  # still allowing significant headroom for chaos experiments.
  minReplicas: 2
  maxReplicas: 10

  # ──────────────────────────────────────────────
  # Metrics
  # ──────────────────────────────────────────────
  metrics:
    # Primary metric: CPU utilization
    # Scale up when average CPU usage across pods exceeds 70%
    # of the requested CPU (250m = 0.25 cores).
    # At 70% of 250m, that's ~175m per pod before scaling.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Secondary metric: Memory utilization
    # Scale up when average memory usage across pods exceeds 80%
    # of the requested memory (256Mi).
    # At 80% of 256Mi, that's ~205Mi per pod before scaling.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # ──────────────────────────────────────────────
  # Scaling Behavior
  # ──────────────────────────────────────────────
  # Controls the rate of scaling to prevent oscillation (flapping).
  behavior:
    # ──────────────────────────────────────────
    # Scale Up Behavior
    # ──────────────────────────────────────────
    # Gradual scale-up to avoid over-provisioning during brief spikes.
    scaleUp:
      # Stabilization window: wait 60s before acting on
      # new metrics to confirm the load is sustained.
      stabilizationWindowSeconds: 60

      # Don't scale up too aggressively.
      # Max 3 new pods or 50% of current replicas per 60s period.
      policies:
        # Add at most 3 pods every 60 seconds
        - type: Pods
          value: 3
          periodSeconds: 60

        # Or increase by at most 50% of current replica count every 60s
        - type: Percent
          value: 50
          periodSeconds: 60

      # Use the policy that adds the fewest pods (conservative scale-up)
      selectPolicy: Min

    # ──────────────────────────────────────────
    # Scale Down Behavior
    # ──────────────────────────────────────────
    # Conservative scale-down to avoid premature removal of pods
    # that may still be needed (e.g., during chaos experiments).
    scaleDown:
      # Stabilization window: wait 300s (5 minutes) of reduced load
      # before scaling down. This prevents flapping during experiments
      # that generate intermittent load patterns.
      stabilizationWindowSeconds: 300

      # Remove pods slowly and conservatively.
      policies:
        # Remove at most 1 pod every 120 seconds (very conservative)
        - type: Pods
          value: 1
          periodSeconds: 120

        # Or decrease by at most 25% of current replica count every 120s
        - type: Percent
          value: 25
          periodSeconds: 120

      # Use the policy that removes the fewest pods (conservative scale-down)
      selectPolicy: Min
