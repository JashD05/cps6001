# =============================================================================
# Chaos-Sec Platform Secrets Template
# =============================================================================
# IMPORTANT: This file contains PLACEHOLDER values only.
# All values must be replaced with actual base64-encoded secrets before
# applying to a production cluster. NEVER commit real secrets to version
# control.
#
# How to encode a secret in base64:
#   echo -n 'your-secret-value' | base64
#
# Or use the deploy script which will prompt for values:
#   ./deploy/scripts/deploy.sh
#
# For production, consider using:
#   - External Secrets Operator (ESO) with AWS Secrets Manager / HashiCorp Vault
#   - Sealed Secrets (bitnami-labs/sealed-secrets)
#   - SOPS (mozilla/sops) for encrypting secrets in Git
#   - cert-manager for TLS certificate management
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: chaos-sec-secrets
  namespace: chaos-sec
  labels:
    app.kubernetes.io/name: chaos-sec-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: chaos-sec
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "Sensitive credentials for the Chaos-Sec platform – replace all placeholders before deploying"
    contact: "dev@chaos-sec.io"
    # Rotation reminder – update secrets before this date
    chaos-sec.io/rotate-before: "2025-03-01"
    # Track which secrets are present for audit tooling
    chaos-sec.io/secret-keys: "DATABASE_PASSWORD,REDIS_PASSWORD,JWT_SECRET,SIEM_API_KEY,SMTP_PASSWORD,RABBITMQ_PASSWORD"
type: Opaque
data:

  # ──────────────────────────────────────────────
  # PostgreSQL Database Credentials
  # ──────────────────────────────────────────────
  # The password for CHAOS_DB_USER (chaossec_admin).
  # Must match the password set in the postgres StatefulSet init container.
  #
  # Generate:
  #   kubectl create secret generic chaos-sec-secrets \
  #     --namespace=chaos-sec \
  #     --from-literal=DATABASE_PASSWORD="$(openssl rand -base64 32)"
  #
  # Placeholder: base64 of "REPLACE_ME"
  DATABASE_PASSWORD: "UkVQTEFDRV9NRQ=="

  # ──────────────────────────────────────────────
  # Redis Credentials
  # ──────────────────────────────────────────────
  # The password for Redis authentication (requirepass).
  # Must match the password configured in the Redis StatefulSet.
  #
  # Generate:
  #   echo -n "$(openssl rand -base64 24)" | base64
  #
  # Placeholder: base64 of "REPLACE_ME"
  REDIS_PASSWORD: "UkVQTEFDRV9NRQ=="

  # ──────────────────────────────────────────────
  # JWT Authentication Secret
  # ──────────────────────────────────────────────
  # The signing key for JSON Web Tokens.
  # Must be at least 32 characters for HS256.
  # Rotate periodically to invalidate existing sessions.
  #
  # Generate:
  #   echo -n "$(openssl rand -base64 48)" | base64
  #
  # Placeholder: base64 of "REPLACE_ME"
  JWT_SECRET: "UkVQTEFDRV9NRQ=="

  # ──────────────────────────────────────────────
  # SIEM Integration API Key
  # ──────────────────────────────────────────────
  # API key for authenticating with the external SIEM provider
  # (e.g., Splunk HEC token, Elastic API key, Datadog API key).
  # Only required when CHAOS_SIEM_ENABLED=true.
  #
  # Generate / obtain from your SIEM provider's admin console.
  #
  # Placeholder: base64 of "REPLACE_ME"
  SIEM_API_KEY: "UkVQTEFDRV9NRQ=="

  # ──────────────────────────────────────────────
  # SMTP Credentials (Notification Service)
  # ──────────────────────────────────────────────
  # Used by the notification/worker service to send alert emails.
  # SMTP_USER is typically the full email address.
  # SMTP_PASSWORD is the app-specific password or OAuth token.
  #
  # Generate: obtain from your email provider (e.g., SendGrid, SES, Mailgun)
  #
  # Placeholder: base64 of "REPLACE_ME"
  SMTP_USER: "UkVQTEFDRV9NRQ=="
  SMTP_PASSWORD: "UkVQTEFDRV9NRQ=="
  SMTP_HOST: "c210cC5leGFtcGxlLmNvbQ=="
  SMTP_PORT: "NTg3"

  # ──────────────────────────────────────────────
  # RabbitMQ Credentials
  # ──────────────────────────────────────────────
  # Username and password for the RabbitMQ message broker.
  # Used by the backend worker service for async experiment processing.
  # Must match credentials configured in RabbitMQ.
  #
  # Generate:
  #   echo -n "$(openssl rand -base64 24)" | base64
  #
  # Placeholder: base64 of "REPLACE_ME"
  RABBITMQ_USER: "Y2hhb3NzZWM="
  RABBITMQ_PASSWORD: "UkVQTEFDRV9NRQ=="

  # ──────────────────────────────────────────────
  # Database Encryption Key
  # ──────────────────────────────────────────────
  # AES-256 encryption key for encrypting sensitive data at rest
  # (e.g., cluster API keys, client certificates stored in the DB).
  # Must be exactly 32 bytes (256 bits) when decoded.
  #
  # Generate:
  #   echo -n "$(openssl rand -base64 32)" | base64
  #
  # Placeholder: base64 of "REPLACE_ME"
  ENCRYPTION_KEY: "UkVQTEFDRV9NRQ=="

---
# =============================================================================
# Chaos-Sec TLS Certificate Secret
# =============================================================================
# TLS certificate and private key for ingress termination.
# In production, use cert-manager with Let's Encrypt or your
# organization's CA to automatically provision and rotate certificates.
#
# For initial setup with a self-signed cert (development only):
#   openssl req -x509 -nodes -days 365 \
#     -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=chaos-sec.io/O=Chaos-Sec"
#   kubectl create secret tls chaos-sec-tls \
#     --namespace=chaos-sec \
#     --key=tls.key --cert=tls.crt
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: chaos-sec-tls
  namespace: chaos-sec
  labels:
    app.kubernetes.io/name: chaos-sec-tls
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: chaos-sec
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "TLS certificate for Chaos-Sec ingress – use cert-manager in production"
    contact: "dev@chaos-sec.io"
    # cert-manager will add its own annotations when issuing certificates
    # cert-manager.io/issuer: "chaos-sec-issuer"
    # cert-manager.io/issuer-kind: "ClusterIssuer"
type: kubernetes.io/tls
data:
  # TLS certificate (PEM format, base64 encoded)
  # Placeholder: base64 of empty – MUST be replaced
  tls.crt: "UkVQTEFDRV9XSVRIX0FCT1ZFX0NFUlQ="
  # TLS private key (PEM format, base64 encoded)
  # Placeholder: base64 of empty – MUST be replaced
  tls.key: "UkVQTEFDRV9XSVRIX0FCT1ZFX0tFWQ=="
  # Optional: CA certificate for client mTLS verification
  ca.crt: "UkVQTEFDRV9XSVRIX0NBX0NFUlQ="

---
# =============================================================================
# Chaos-Sec Service Account Token Secret
# =============================================================================
# Used by the backend to interact with the Kubernetes API for
# chaos experiment orchestration. The service account must have
# appropriate RBAC permissions (see rbac.yaml).
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: chaos-sec-backend-sa-token
  namespace: chaos-sec
  labels:
    app.kubernetes.io/name: chaos-sec-backend-sa-token
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: chaos-sec
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "Service account token for backend Kubernetes API access"
    kubernetes.io/service-account.name: "chaos-sec-backend"
type: kubernetes.io/service-account-token
data: {}
