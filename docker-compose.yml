services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: chaos-sec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chaossec
      POSTGRES_USER: chaossec_admin
      POSTGRES_PASSWORD: chaossec_local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaossec_admin -d chaossec"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # Redis Cache & Session Store
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chaos-sec-redis
    restart: unless-stopped
    command: redis-server --requirepass chaossec_redis_local_password --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "chaossec_redis_local_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # RabbitMQ Message Queue
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: chaos-sec-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: chaossec
      RABBITMQ_DEFAULT_PASS: chaossec_rabbitmq_local_password
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # Mock SIEM Service
  # ──────────────────────────────────────────────
  mock-siem:
    build:
      context: ./backend
      dockerfile: Dockerfile.mock-siem
    container_name: chaos-sec-mock-siem
    restart: unless-stopped
    environment:
      SIEM_PORT: "8089"
      SIEM_LOG_LEVEL: info
    ports:
      - "8089:8089"
    volumes:
      - mock_siem_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "-O",
          "/dev/null",
          "http://localhost:8089/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # Chaos-Sec Backend API
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chaos-sec-backend
    restart: unless-stopped
    environment:
      CHAOS_SERVER_HOST: "0.0.0.0"
      CHAOS_SERVER_PORT: "8080"
      CHAOS_DB_HOST: postgres
      CHAOS_DB_PORT: "5432"
      CHAOS_DB_NAME: chaossec
      CHAOS_DB_USER: chaossec_admin
      CHAOS_DB_PASSWORD: chaossec_local_dev_password
      CHAOS_DB_SSLMODE: disable
      CHAOS_DB_MAX_OPEN_CONNS: "50"
      CHAOS_REDIS_HOST: redis
      CHAOS_REDIS_PORT: "6379"
      CHAOS_REDIS_PASSWORD: chaossec_redis_local_password
      CHAOS_REDIS_DB: "0"
      CHAOS_DB_MIGRATIONS_PATH: file:///app/migrations
      CHAOS_JWT_SECRET: local-dev-jwt-secret-change-in-production-32chars!!
      CHAOS_JWT_EXPIRY: 1h
      CHAOS_JWT_REFRESH_EXPIRY: 168h
      CHAOS_SIEM_ENABLED: "true"
      CHAOS_SIEM_PROVIDER: mock
      CHAOS_SIEM_ENDPOINT: http://mock-siem:8089
      CHAOS_LOG_LEVEL: debug
      CHAOS_LOG_FORMAT: json
      CHAOS_RATE_LIMIT_ENABLED: "true"
      CHAOS_RATE_LIMIT_REQUESTS: "100"
      CHAOS_RATE_LIMIT_WINDOW: 60s
      CHAOS_K8S_NAMESPACE: chaos-sec-experiments
      CHAOS_K8S_POD_TIMEOUT: 600s
      CHAOS_K8S_MAX_CONCURRENT: "10"
      CHAOS_K8S_IN_CLUSTER: "true"
    ports:
      - "8081:8080"
      - "9090:9090"
    volumes:
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-siem:
        condition: service_healthy
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # Chaos-Sec Frontend Dashboard
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: chaos-sec-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8081/api/v1
      VITE_WS_URL: ws://localhost:8081/ws
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # Prometheus (Metrics Collection)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: chaos-sec-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - chaos-sec-net

  # ──────────────────────────────────────────────
  # Grafana (Dashboards & Visualization)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: chaos-sec-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - chaos-sec-net

# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  mock_siem_data:
    driver: local
  go_mod_cache:
    driver: local
  frontend_node_modules:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  chaos-sec-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
