# ============================================================================
# Chaos-Sec Frontend Nginx Configuration
# Serves the React SPA, proxies API/WebSocket to backend
# ============================================================================

# Upstream definitions for backend services
upstream backend_api {
    server backend:8080;
}

upstream backend_ws {
    server backend:8080;
}

# ----------------------------------------------------------------------------
# Main server block
# ----------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # ----------------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws://localhost:8080 http://localhost:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------------------
    # Gzip Compression
    # ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2
        font/ttf
        font/opentype;

    # ----------------------------------------------------------------
    # API Proxy – forward /api to the backend service
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout tuning for long-running experiment requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ----------------------------------------------------------------
    # WebSocket Proxy – forward /ws to the backend WebSocket
    # ----------------------------------------------------------------
    location /ws {
        proxy_pass http://backend_ws/ws;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for persistent WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for real-time data
        proxy_buffering off;
    }

    # ----------------------------------------------------------------
    # Static asset caching – hashed JS/CSS bundles
    # ----------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # Service worker – must not be cached
    # ----------------------------------------------------------------
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";

        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # Health check endpoint (returns 200 directly from nginx)
    # ----------------------------------------------------------------
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------------------------------
    # SPA Fallback – serve index.html for all client-side routes
    # ----------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Disable caching for the HTML shell (always fetch latest)
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ----------------------------------------------------------------
    # Block access to hidden files (e.g. .env, .git)
    # ----------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----------------------------------------------------------------
    # Block access to source maps in production
    # ----------------------------------------------------------------
    location ~* \.map$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----------------------------------------------------------------
    # Error pages
    # ----------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
