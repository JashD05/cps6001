# ============================================================================
# Chaos-Sec: Kind Cluster Configuration
# Multi-node Kubernetes-in-Docker cluster for local development & chaos testing
# ============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: chaos-sec

# ──────────────────────────────────────────────
# Cluster Network
# ──────────────────────────────────────────────
networking:
  # Use a non-overlapping pod CIDR to avoid conflicts with Docker networks
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  # Disable default CNI — we use the Kind default (kindnet) unless overridden
  disableDefaultCNI: false
  kubeProxyMode: "iptables"

# ──────────────────────────────────────────────
# Node Configuration
# ──────────────────────────────────────────────
nodes:
  # ──────────────────────────────────────────
  # Control Plane Node
  # ──────────────────────────────────────────
  - role: control-plane
    image: kindest/node:v1.28.0@sha256:b7a4cad12c197af3ba43202d3efe03246b3f0793f162afb40a33c923952d5b31
    labels:
      app.kubernetes.io/part-of: chaos-sec
      chaos-sec.io/role: control-plane
      chaos-sec.io/cluster: chaos-sec-dev
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Port mappings for control-plane
    extraPortMappings:
      # HTTP ingress
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS ingress
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Backend API (NodePort)
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      # Backend Metrics (NodePort)
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP

  # ──────────────────────────────────────────
  # Worker Node 1
  # ──────────────────────────────────────────
  - role: worker
    image: kindest/node:v1.28.0@sha256:b7a4cad12c197af3ba43202d3efe03246b3f0793f162afb40a33c923952d5b31
    labels:
      app.kubernetes.io/part-of: chaos-sec
      chaos-sec.io/role: worker
      chaos-sec.io/cluster: chaos-sec-dev
      chaos-sec.io/chaos-target: "true"
    # Additional port mappings for worker 1
    extraPortMappings:
      # Alternate HTTP port (for services that need a separate ingress)
      - containerPort: 81
        hostPort: 81
        protocol: TCP

  # ──────────────────────────────────────────
  # Worker Node 2
  # ──────────────────────────────────────────
  - role: worker
    image: kindest/node:v1.28.0@sha256:b7a4cad12c197af3ba43202d3efe03246b3f0793f162afb40a33c923952d5b31
    labels:
      app.kubernetes.io/part-of: chaos-sec
      chaos-sec.io/role: worker
      chaos-sec.io/cluster: chaos-sec-dev
      chaos-sec.io/chaos-target: "true"
      chaos-sec.io/pool: high-priority

# ──────────────────────────────────────────────
# Feature Gates
# ──────────────────────────────────────────────
featureGates:
  # Enable ServerSideApply for smoother kubectl apply
  ServerSideApply: true

# ──────────────────────────────────────────────
# Container Runtime
# ──────────────────────────────────────────────
# Default is containerd, which is the standard for Kind
# Uncomment below to customize runtime if needed
# containerdConfigPatches:
#   - |-
#     [plugins."io.containerd.grpc.v1.cri".containerd]
#       discard_unpacked_layers = false
